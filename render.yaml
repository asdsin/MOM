services:
  - type: web
    name: mom-system
    runtime: docker
    dockerfilePath: ./Dockerfile.prod
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      # SQLite 인메모리 — 외부 DB 불필요, 시작 시 자동 시드
      - key: DB_DIALECT
        value: sqlite
      - key: DB_STORAGE
        value: ":memory:"
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 8h
